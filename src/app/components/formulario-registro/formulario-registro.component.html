<section class="form-card">

  <h2>Novo Registro</h2>

  <form class="formulario" (ngSubmit)="adicionarRegistro()">

    <div class="campo descricao">
      <label for="descricao">Descrição</label>
      <input
        id="descricao"
        type="text"
        placeholder="Ex: Salário, aluguel, mercado..."
        name="descricao"
        [(ngModel)]="descricao"
        required>
    </div>

    <div class="campo">
      <label for="tipo">Tipo</label>
      <select id="tipo" name="tipo" [(ngModel)]="tipo" required>
        <option value="Entrada">Entrada</option>
        <option value="Saída">Saída</option>
        <option value="Investimento">Investimento</option>
      </select>
    </div>

    <div class="campo">
      <label for="categoria">Categoria</label>
      <select id="categoria" name="categoria" [(ngModel)]="categoria" required>
        <option value="">Selecione</option>

        <option
          *ngFor="let categoria of categorias"
          [value]="categoria">
          {{ categoria }}
        </option>
      </select>
    </div>

    <div class="campo">
      <label for="data">Data</label>
      <input
        id="data"
        type="date"
        name="data"
        [(ngModel)]="data"
        required>
    </div>

    <div class="campo">
      <label for="valor">Valor</label>
      <input
        id="valor"
        type="number"
        placeholder="0,00"
        name="valor"
        [(ngModel)]="valor"
        required>
    </div>

    <button class="btn-adicionar" type="submit">
      Adicionar
    </button>

  </form>

</section>
